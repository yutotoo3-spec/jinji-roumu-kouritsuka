<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入社手続き管理 | 人事労務効率化</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="app-header">
    <a class="app-title" href="#/">
      <span class="app-logo">🗂</span>
      <span>入社手続き管理</span>
    </a>
    <div class="header-actions">
      <button class="btn btn-secondary" id="btn-settings" title="通知などの設定">⚙ 設定</button>
      <button class="btn btn-primary" id="btn-add">＋ 新規登録</button>
    </div>
  </header>

  <main id="app"></main>

  <!-- 入社者登録モーダル -->
  <dialog id="dialog-add">
    <form id="form-add" method="dialog">
      <h2>入社者・業務委託の登録</h2>
      <p class="dialog-note">登録すると、雇用区分に応じた標準タスクが入社日（稼働開始日）から逆算した期日付きで自動生成されます。</p>
      <label>氏名 <span class="req">必須</span>
        <input name="name" required placeholder="山田 太郎">
      </label>
      <label>メールアドレス
        <input name="email" type="email" placeholder="taro@example.com">
      </label>
      <label>HERP候補者URL <span class="opt">任意</span>
        <input name="herpUrl" type="url" placeholder="https://agent.herp.cloud/... （HERPの候補者詳細ページ）">
      </label>
      <div class="form-row">
        <label>雇用区分 <span class="req">必須</span>
          <select name="employmentType"></select>
        </label>
        <label><span id="add-joindate-label">入社日</span> <span class="req">必須</span>
          <input name="joinDate" type="date" required>
        </label>
      </div>
      <div class="form-row">
        <label>ポジション
          <input name="position" placeholder="ソフトウェアエンジニア">
        </label>
        <label>部署
          <input name="department" placeholder="開発部">
        </label>
      </div>
      <div class="form-row">
        <label id="add-housing-field">社宅利用
          <select name="housingUse">
            <option value="未確認">未確認</option>
            <option value="利用する">利用する</option>
            <option value="利用しない">利用しない</option>
          </select>
        </label>
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn btn-secondary" data-close>キャンセル</button>
        <button type="submit" class="btn btn-primary">登録する</button>
      </div>
      <p class="form-error" id="add-error"></p>
    </form>
  </dialog>

  <!-- 設定モーダル -->
  <dialog id="dialog-settings">
    <div class="dialog-body">
      <h2>⚙ 設定</h2>
      <section class="settings-section">
        <label class="toggle-row">
          <input type="checkbox" id="setting-slack">
          <span>
            <strong>Slackデイリー通知</strong><br>
            <small id="setting-slack-desc">毎朝、期限超過・本日期日・本人対応待ちなどをSlackに通知します。オフにすると通知は送られません。</small>
          </span>
        </label>
        <p class="settings-status" id="slack-status"></p>
        <div class="settings-actions">
          <button type="button" class="btn btn-secondary btn-sm" id="btn-slack-test">テスト送信</button>
          <button type="button" class="btn btn-secondary btn-sm" id="btn-slack-preview">通知内容をプレビュー</button>
        </div>
        <pre id="slack-preview" class="slack-preview" hidden></pre>
      </section>
      <div class="dialog-actions">
        <button type="button" class="btn btn-primary" data-close>閉じる</button>
      </div>
    </div>
  </dialog>

  <div id="toast" class="toast" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
